<!DOCTYPE html>
<html lang="en">
<head>
	<title>Login</title>
	<meta charset="utf-8">
	<link rel="icon" type="image/x-icon" href="assets/ui/favicon.svg"/>
	<style>
html, body {
	background: #252526;
	font-family: sans-serif;
	font-size: 16px;
	line-height: 1.2;
	height: 100%;
	margin: 0;
	overflow: hidden;
}

.spacer {
	margin-top:50px;
}

.container {
	text-align:center;
}

.label, label {
	display:inline-block;
	color: #eeeeee;
	font-size: 30px;
	min-width:100px;
	padding: 5px;
	margin: 5px;
	text-align: center;
	position: relative;
	word-wrap: break-word;
}

form {
	width:400px;
	margin:auto;
	text-align:center;
}

input {
	background: #91a0b8;
	color: #000000;
	font-size: 30px;
	width: 200px;
	min-height: 34px;
	padding: 5px;
	padding-top: 0px;
	margin: 5px;
	margin-top: 0px;
	vertical-align: middle;
	text-align: left;
	position: relative;
	border-radius: 5px;
	border-style: solid;
	border-color: #000000;
}

button {
	background: #181818;
	color: #eeeeee;
	width: 120px;
	font-size: 30px;
	padding: 5px;
	margin: 5px;
	text-align:center;
	position: relative;
	border-radius: 5px;
	border-style: solid;
	border-color: #000000;
	vertical-align: middle;
	display:inline-block;
	cursor: pointer;
}

input:focus, button:focus {
	border-color: #00b0b0;
	outline: none;
}

input:disabled, button:disabled {
	color: #555555;
	border-color: #b06000;
	outline: none;
}
	</style>
</head>
<body>
	<div class="spacer"></div>
	<div class="container">
		<div class="label">Login</div>
	</div>
	<form method="POST" action="/login" id="login-form">
		<label for="username">User</label><input type="text" id="username" name="username" autocomplete="username" required>
		<label for="password">Pass</label><input type="password" id="password" name="password" autocomplete="current-password" required>
		<button type="submit" id="confirm">Log In</button>
	</form>
	<div class="container">
		<div class="label" id="error"></div>
	</div>
	<script>
const loginform = document.getElementById("login-form");
const user = document.getElementById("username");
const pass = document.getElementById("password");
const confirm = document.getElementById("confirm");
const error = document.getElementById("error");

function toggle(state)
{
	user.disabled = state;
	pass.disabled = state;
	confirm.disabled = state;
}

document.getElementById("login-form").addEventListener("submit", async (event) => {
	event.preventDefault();
	toggle(true);
	error.textContent = "";
	confirm.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 14 32 4" fill="#ffffff" preserveAspectRatio="none"><path opacity="0.8" transform="translate(0 0)" d="M2 14 V18 H6 V14z"><animateTransform attributeName="transform" type="translate" values="0 0; 24 0; 0 0" dur="2s" begin="0" repeatCount="indefinite" keySplines="0.2 0.2 0.4 0.8;0.2 0.2 0.4 0.8" calcMode="spline"/></path><path opacity="0.5" transform="translate(0 0)" d="M0 14 V18 H8 V14z"><animateTransform attributeName="transform" type="translate" values="0 0; 24 0; 0 0" dur="2s" begin="0.1s" repeatCount="indefinite" keySplines="0.2 0.2 0.4 0.8;0.2 0.2 0.4 0.8" calcMode="spline"/></path><path opacity="0.25" transform="translate(0 0)" d="M0 14 V18 H8 V14z"><animateTransform attributeName="transform" type="translate" values="0 0; 24 0; 0 0" dur="2s" begin="0.2s" repeatCount="indefinite" keySplines="0.2 0.2 0.4 0.8;0.2 0.2 0.4 0.8" calcMode="spline"/></path></svg>';
	try {
		const response = await fetch("/login", {
			method:"POST",
			headers:{
				"Content-Type":"application/json"
			},
			body:JSON.stringify({
				username:user.value,
				password:pass.value
			})
		});
		if(response.ok)
		{
			if(window.PasswordCredential)
			{
                const credential = new PasswordCredential({
                    id:user.value,
                    password:pass.value
                });
                await navigator.credentials.store(credential);
            }
			window.location.href = "/";
		}
		else
		{
			error.textContent = "Login failed.";
			toggle(false);
			confirm.textContent = "Log In";
		}
	} catch(err) {
		console.error("Exception thrown", err.stack);
		error.textContent = "Unable to connect.";
		toggle(false);
		confirm.textContent = "Log In";
	}
});
	</script>
</body>
</html>
